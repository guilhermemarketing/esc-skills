name: Verify Skill Versions

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'manifest.json'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'manifest.json'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify manifest integrity
        run: python3 scripts/update_manifest.py --verify
